<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — ai4smartmfg</title>
  <meta name="description" content="Start a conversation with ai4smartmfg. All discussions remain strictly confidential.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="contact-page">

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="wordmark" aria-label="ai4smartmfg home">
      <span class="mark-prefix">ai4</span><span class="mark-rest">smartmfg</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav" aria-label="Primary">
      <a href="about.html">About</a>
      <a href="approach.html">Approach</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section>
    <div class="container">
      <p class="eyebrow">Contact</p>
      <h1 style="font-size: clamp(36px, 5vw, 56px); letter-spacing: -0.03em; line-height: 1.1; margin: 0 0 24px 0; font-weight: 700;">Start a conversation.</h1>
      <p class="large">Tell us a little about your factory and the problem you would like to solve. All discussions remain strictly confidential.</p>

      <form class="contact-form" action="https://formspree.io/f/REPLACE_ME" method="POST" novalidate>
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required autocomplete="name">
        </div>
        <div class="form-row">
          <label for="company">Company</label>
          <input id="company" name="company" type="text" autocomplete="organization">
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email">
        </div>
        <div class="form-row">
          <label for="phone">Phone (optional)</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel">
        </div>
        <div class="form-row">
          <label for="message">What would you like to discuss?</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn">Send</button>
        <p class="form-note">We respond within one business day.</p>
      </form>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>© 2026 Asyjo. ai4smartmfg is an Asyjo company.</p>
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="approach.html">Approach</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script src="assets/js/nav.js"></script>
</body>
</html>
