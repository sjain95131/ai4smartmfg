# Cloudflare Pages project config for ai4smartmfg
# Read automatically on each git-based deploy.

name = "ai4smartmfg"
compatibility_date = "2026-05-21"
pages_build_output_dir = "."

# Service Binding — lets functions/contact.js call the email-relay Worker
# (deployed separately from worker/wrangler.toml). The Worker holds the
# Send Email binding, which Pages Functions in this account don't expose.
[[services]]
binding = "EMAIL_RELAY"
service = "ai4smartmfg-email-relay"
